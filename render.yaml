services:
  # Backend API
  - type: web
    name: myapp-backend
    runtime: node
    rootDir: ./backend
    buildCommand: npm install
    startCommand: npm start

  # Frontend Static Site
  - type: web
    name: myapp-frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build