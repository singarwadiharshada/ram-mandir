services:
  # Backend API
  - type: web
    name: myapp-backend
    runtime: node
    rootDir: ./backend
    buildCommand: npm install
    startCommand: npm start

  # Frontend Static Site
  - type: web
    name: myapp-frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: |  # This allows multi-line commands
      npm install
      npm run build
    staticPublishPath: ./build
    # Optional: Add environment variables if needed
    envVars:
      - key: REACT_APP_API_URL
        value: https://your-backend-url.onrender.com