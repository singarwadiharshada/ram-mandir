services:
  # Backend API
  - type: web
    name: myapp-backend
    runtime: node        # Use 'runtime' instead of 'env'
    rootDir: ./backend
    buildCommand: npm install
    startCommand: npm start

  # Frontend Static Site
  - type: web
    name: myapp-frontend
    runtime: static      # Use 'runtime' instead of 'env'
    rootDir: ./frontend
    # ✅ Correct build command: install dependencies THEN build
    buildCommand: npm install && npm run build
    # ✅ Correct publish directory for Create React App
    staticPublishPath: ./build