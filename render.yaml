services:
  # Backend API
  - type: web
    name: myapp-backend
    runtime: node
    rootDir: ./backend
    buildCommand: npm install
    startCommand: npm start

  # Frontend Static Site - CHANGED THIS FROM 'web' TO 'static'
  - type: static
    name: myapp-frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: ./build
    # Optional: Add environment variables if needed
    envVars:
      - key: REACT_APP_API_URL
        value: https://ram-mandir-back.onrender.com/api